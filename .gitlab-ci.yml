stages:
  - format
  - lint
  - test
  - typecheck
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

.setup_uv: &setup_uv
  image: ghcr.io/astral-sh/uv:0.11-python3.11-trixie-slim
  variables:
    UV_CACHE_DIR: .uv-cache
    UV_LINK_MODE: copy
  cache:
    key:
      files:
        - uv.lock
    paths:
      - .uv-cache
  before_script:
    - uv sync --extra dev --frozen
  after_script:
    - uv cache prune --ci

ruff_format:
  <<: *setup_uv
  stage: format
  script:
    - uv run ruff format --check src tests

ruff_lint:
  <<: *setup_uv
  stage: lint
  script:
    - uv run ruff check src tests

pytest:
  <<: *setup_uv
  stage: test
  script:
    - uv run pytest -m "not slow"

mypy:
  <<: *setup_uv
  stage: typecheck
  script:
    - uv run mypy .