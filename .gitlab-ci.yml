stages:
  - format
  - lint
  - security
  - test
  - typecheck

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

.setup_uv: &setup_uv
  image: ghcr.io/astral-sh/uv:0.11-python3.11-trixie-slim
  variables:
    UV_CACHE_DIR: .uv-cache
    UV_LINK_MODE: copy
  cache:
    key:
      files:
        - uv.lock
    paths:
      - .uv-cache
  before_script:
    - uv sync --extra dev --frozen
  after_script:
    - uv cache prune --ci

ruff_format:
  <<: *setup_uv
  stage: format
  script:
    - uv run ruff format --check src tests

ruff_lint:
  <<: *setup_uv
  stage: lint
  script:
    - uv run ruff check src tests

bandit:
  <<: *setup_uv
  stage: security
  script:
    - uv run bandit -r src -c pyproject.toml

vulture:
  <<: *setup_uv
  stage: security
  script:
    - uv run vulture src tests --min-confidence 80

pytest:
  <<: *setup_uv
  stage: test
  script:
    - uv run pytest -m "not slow" --cov-fail-under=60
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml

mypy:
  <<: *setup_uv
  stage: typecheck
  script:
    - uv run mypy .
