repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff formatter
        entry: uv run ruff format
        stages: [pre-commit]
        language: system
        types: [python]
      - id: ruff
        name: ruff linter
        entry: uv run ruff check --fix
        stages: [pre-commit]
        language: system
        types: [python]
      - id: pytest
        name: pytest
        entry: uv run pytest -m "not slow"
        stages: [pre-commit]
        language: system
        types: [python]
        pass_filenames: false
      - id: mypy
        name: mypy
        entry: uv run mypy .
        stages: [pre-commit]
        language: system
        types: [python]
        pass_filenames: false